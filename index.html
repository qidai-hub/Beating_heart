<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Star Journey</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 100vw; height: 100vh; overflow: hidden;
  font-family: 'Ma Shan Zheng', 'PingFang SC', 'Microsoft YaHei', cursive, sans-serif;
  background: #000;
  color: #fff;
  -webkit-tap-highlight-color: transparent;
}
.page { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
.page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

/* ===== Page 1: Dog ===== */
#page-dog {
  background: linear-gradient(160deg, #0d0015 0%, #1a0a2e 30%, #2d1b4e 60%, #1a0a2e 100%);
  cursor: pointer; overflow: hidden;
}
#page-dog canvas { position: absolute; top: 0; left: 0; }
#page-dog .dog-container {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 2; position: relative;
}
#page-dog .dog-img {
  width: 220px; height: auto; border-radius: 20px;
  filter: drop-shadow(0 0 30px rgba(255,105,180,0.4));
  animation: dogFloat 3s ease-in-out infinite;
}
@keyframes dogFloat {
  0%, 100% { transform: translateY(0) rotate(-1deg); }
  50% { transform: translateY(-18px) rotate(1deg); }
}
#page-dog .welcome-text {
  margin-top: 25px; font-size: 22px; color: #ffb6d9;
  text-shadow: 0 0 15px rgba(255,105,180,0.5); letter-spacing: 3px;
}
#page-dog .tap-hint {
  margin-top: 35px; font-size: 16px; color: rgba(255,182,217,0.6);
  animation: breathe 2.5s ease-in-out infinite; letter-spacing: 5px;
}
@keyframes breathe {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

/* ===== Page 2: Starry Heart ===== */
#page-heart { background: #000; }
#page-heart .end-btn {
  position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
  padding: 12px 38px; border: 1px solid rgba(255,105,180,0.4); border-radius: 25px;
  background: rgba(0,0,0,0.4); color: rgba(255,105,180,0.8); font-size: 16px;
  cursor: pointer; z-index: 10; transition: all 0.4s ease;
  backdrop-filter: blur(8px); letter-spacing: 4px; font-family: inherit;
}
#page-heart .end-btn:hover {
  background: rgba(255,105,180,0.15);
  box-shadow: 0 0 20px rgba(255,105,180,0.3); color: #ff69b4;
}

/* ===== Page 3: Firework ===== */
#page-firework { background: #000; }
#page-firework .blessing {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 32px; z-index: 10;
  white-space: nowrap; opacity: 0;
  animation: blessingIn 3s ease-out 0.8s forwards;
  pointer-events: none; letter-spacing: 6px;
  background: linear-gradient(90deg, #ff0000, #ff4060, #ff80a0, #ffcc00, #ff4060, #ff0000);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 12px rgba(255,0,0,0.8)) drop-shadow(0 0 30px rgba(255,50,50,0.5)) drop-shadow(0 0 60px rgba(255,100,50,0.3));
}
#page-firework .blessing.active {
  animation: blessingIn 3s ease-out forwards, shimmer 3s linear 3s infinite, floatText 4s ease-in-out 3s infinite;
}
@keyframes blessingIn {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.1) rotate(-5deg); filter: blur(15px) drop-shadow(0 0 0 transparent); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15) rotate(1deg); filter: blur(0) drop-shadow(0 0 20px rgba(255,0,0,0.9)); }
  70% { transform: translate(-50%, -50%) scale(0.95) rotate(-0.5deg); }
  100% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); filter: blur(0) drop-shadow(0 0 12px rgba(255,0,0,0.8)) drop-shadow(0 0 30px rgba(255,50,50,0.5)); }
}
@keyframes shimmer {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}
@keyframes floatText {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -52%) scale(1.03); }
}

.fade-in { animation: fadeIn 1.2s ease-out; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<!-- Page 1: Happy Dog -->
<div id="page-dog" class="page active" onclick="enterHeartPage()">
  <canvas id="dogBgCanvas"></canvas>
  <div class="dog-container">
    <img class="dog-img" src="20260410-200645.jpg" alt="biu~">
    <div class="welcome-text">欢迎婷婷</div>
    <div class="tap-hint">- 开启星空之旅 -</div>
  </div>
</div>

<!-- Page 2: Starry Heart -->
<div id="page-heart" class="page">
  <canvas id="heartCanvas"></canvas>
  <button class="end-btn" onclick="enterFireworkPage()">结束旅程</button>
</div>

<!-- Page 3: Firework -->
<div id="page-firework" class="page">
  <canvas id="fireworkCanvas"></canvas>
  <div class="blessing" id="blessingText">祝婷婷天天开心~</div>
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="20260410-195521.mp3" type="audio/mpeg">
</audio>

<script>
// ===== Global =====
let heartAnimId = null;
let fireworkAnimId = null;
let dogBgAnimId = null;

function setupCanvas(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { ctx, w, h };
}

// ===== Dog Background =====
function startDogBg() {
  const canvas = document.getElementById('dogBgCanvas');
  const { ctx, w, h } = setupCanvas(canvas);
  class P {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * w; this.y = Math.random() * h;
      this.size = Math.random() * 2 + 0.5;
      this.vy = -(Math.random() * 0.5 + 0.1);
      this.vx = (Math.random() - 0.5) * 0.3;
      this.alpha = Math.random() * 0.5 + 0.1;
      this.isHeart = Math.random() < 0.08;
    }
    update() {
      this.y += this.vy; this.x += this.vx + Math.sin(this.y * 0.005) * 0.2;
      if (this.y < -10) { this.reset(); this.y = h + 10; }
    }
    draw(ctx) {
      if (this.isHeart) {
        ctx.save(); ctx.globalAlpha = this.alpha * 0.7;
        ctx.fillStyle = '#ff69b4'; ctx.font = `${this.size * 8}px serif`;
        ctx.fillText('\u2665', this.x, this.y); ctx.restore();
      } else {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,200,230,${this.alpha})`; ctx.fill();
      }
    }
  }
  const ps = Array.from({ length: 80 }, () => new P());
  function loop() {
    ctx.clearRect(0, 0, w, h);
    for (const p of ps) { p.update(); p.draw(ctx); }
    dogBgAnimId = requestAnimationFrame(loop);
  }
  dogBgAnimId = requestAnimationFrame(loop);
}

// ===== Navigation =====
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active', 'fade-in'));
  document.getElementById(id).classList.add('active', 'fade-in');
}
function enterHeartPage() {
  document.getElementById('bgMusic').play().catch(() => {});
  if (dogBgAnimId) cancelAnimationFrame(dogBgAnimId);
  showPage('page-heart');
  startHeartAnimation();
}
function enterFireworkPage() {
  if (heartAnimId) cancelAnimationFrame(heartAnimId);
  showPage('page-firework');
  startFireworkAnimation();
  setTimeout(() => document.getElementById('blessingText').classList.add('active'), 50);
}

// ===== Sky =====
function getSkyConfig() {
  const h = new Date().getHours();
  if (h >= 6 && h < 8) return { bg: ['#0a0015','#1a0a2e','#3d1a5e','#6b2fa0','#c06030'], starAlpha: 0.4 };
  if (h >= 8 && h < 17) return { bg: ['#0a0020','#1a1050','#2a2070','#3a3090'], starAlpha: 0.15 };
  if (h >= 17 && h < 19) return { bg: ['#0a0015','#2a0a3e','#5a1a4e','#a03030','#d06020'], starAlpha: 0.5 };
  return { bg: ['#000005','#050010','#0a0a1a','#0d1025'], starAlpha: 1.0 };
}
function drawSky(ctx, w, h, cfg) {
  const g = ctx.createLinearGradient(0, 0, 0, h);
  cfg.bg.forEach((c, i) => g.addColorStop(i / (cfg.bg.length - 1), c));
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
}

// ===== Milky Way (紫色银河 + 3D旋转) =====
class MilkyWay {
  constructor(w, h) {
    this.w = w; this.h = h;
    this.cx = w / 2; this.cy = h / 2;
    this.angle = 0; // 3D rotation angle
    // 银河粒子存储为相对于中心的3D坐标
    this.particles = [];
    this.dustClouds = [];

    // 5000 粒子沿带状分布（3D空间中的扁平环带）
    for (let i = 0; i < 5000; i++) {
      const t = Math.random() * Math.PI * 2; // angle along the band
      const bandRadius = w * 0.5 + (Math.random() - 0.5) * w * 0.25;
      // 3D: x,y on the plane, z for thickness
      const x = Math.cos(t) * bandRadius;
      const y = Math.sin(t) * bandRadius * 0.25; // elliptical
      const z = this._gaussian() * 25; // thin disk
      // 距中心的距离影响亮度
      const dist = Math.sqrt(x * x + y * y) / (w * 0.6);
      // 颜色分层
      const bandDist = Math.abs(z) / 25;
      let r, g, b;
      const cr = Math.random();
      if (bandDist < 0.3 && cr < 0.3) {
        // 核心亮白
        r = 220 + Math.random() * 35; g = 200 + Math.random() * 40; b = 240 + Math.random() * 15;
      } else if (cr < 0.55) {
        // 紫色主体
        r = 160 + Math.random() * 60; g = 100 + Math.random() * 60; b = 210 + Math.random() * 45;
      } else if (cr < 0.8) {
        // 蓝紫
        r = 100 + Math.random() * 60; g = 90 + Math.random() * 60; b = 180 + Math.random() * 60;
      } else {
        // 粉紫
        r = 180 + Math.random() * 50; g = 80 + Math.random() * 50; b = 180 + Math.random() * 50;
      }
      const size = Math.random() < 0.08 ? Math.random() * 2.5 + 1.5 : Math.random() * 1.3 + 0.3;
      const alpha = (1 - bandDist * 0.5) * (1 - dist * 0.3) * (Math.random() * 0.5 + 0.35);
      this.particles.push({
        x, y, z, r, g, b, size, alpha,
        twinkle: Math.random() * 0.015 + 0.004,
        twinkleOff: Math.random() * Math.PI * 2
      });
    }

    // 星云尘埃 — 更大更亮
    for (let i = 0; i < 25; i++) {
      const t = Math.random() * Math.PI * 2;
      const bandRadius = w * 0.35 + Math.random() * w * 0.2;
      const x = Math.cos(t) * bandRadius;
      const y = Math.sin(t) * bandRadius * 0.25;
      const z = (Math.random() - 0.5) * 30;
      const colors = [
        [140, 60, 200], [100, 50, 180], [170, 80, 220],
        [90, 60, 170], [180, 100, 230], [120, 70, 200],
        [160, 50, 190], [200, 100, 240]
      ];
      const c = colors[Math.floor(Math.random() * colors.length)];
      this.dustClouds.push({
        x, y, z,
        radius: Math.random() * 100 + 60,
        r: c[0], g: c[1], b: c[2],
        alpha: Math.random() * 0.08 + 0.04,
        pulseSpeed: Math.random() * 0.006 + 0.002,
        pulseOff: Math.random() * Math.PI * 2
      });
    }
  }
  _gaussian() {
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
  }
  // 3D -> 2D projection with rotation
  _project(x, y, z) {
    // rotate around Z axis (spin the galaxy in its plane)
    const cosA = Math.cos(this.angle), sinA = Math.sin(this.angle);
    const rx = x * cosA - y * sinA;
    const ry = x * sinA + y * cosA;
    // tilt: rotate around X axis for 3D perspective
    const tilt = 0.6; // fixed tilt for viewing angle
    const cosT = Math.cos(tilt), sinT = Math.sin(tilt);
    const ry2 = ry * cosT - z * sinT;
    const rz = ry * sinT + z * cosT;
    // perspective
    const fov = 800;
    const scale = fov / (fov + rz + 200);
    return {
      sx: this.cx + rx * scale,
      sy: this.cy + ry2 * scale,
      scale, z: rz
    };
  }
  draw(ctx, time, alpha) {
    if (alpha < 0.01) return;
    this.angle += 0.0004; // slow rotation

    ctx.save();
    ctx.globalAlpha = alpha;

    // 尘埃云
    for (const d of this.dustClouds) {
      const p = this._project(d.x, d.y, d.z);
      const pulse = 0.8 + 0.2 * Math.sin(time * d.pulseSpeed + d.pulseOff);
      const r = d.radius * pulse * p.scale;
      if (r < 2 || p.sx < -r || p.sx > this.w + r || p.sy < -r || p.sy > this.h + r) continue;
      const g = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, r);
      g.addColorStop(0, `rgba(${d.r},${d.g},${d.b},${d.alpha * 2.5})`);
      g.addColorStop(0.4, `rgba(${d.r},${d.g},${d.b},${d.alpha * 1.2})`);
      g.addColorStop(1, `rgba(${d.r},${d.g},${d.b},0)`);
      ctx.fillStyle = g;
      ctx.fillRect(p.sx - r, p.sy - r, r * 2, r * 2);
    }

    // 微粒（按深度排序，远的先画）
    // 简化：不排序，直接画也能接受
    for (const pt of this.particles) {
      const p = this._project(pt.x, pt.y, pt.z);
      if (p.sx < -5 || p.sx > this.w + 5 || p.sy < -5 || p.sy > this.h + 5) continue;
      const tw = 0.6 + 0.4 * Math.sin(time * pt.twinkle + pt.twinkleOff);
      const depthFade = Math.max(0.2, p.scale);
      const a = pt.alpha * tw * depthFade;
      const sz = pt.size * p.scale;
      if (a < 0.02 || sz < 0.15) continue;
      ctx.beginPath(); ctx.arc(p.sx, p.sy, sz, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${pt.r},${pt.g},${pt.b},${a})`;
      ctx.fill();
      if (sz > 1.5) {
        ctx.beginPath(); ctx.arc(p.sx, p.sy, sz * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${pt.r},${pt.g},${pt.b},${a * 0.1})`;
        ctx.fill();
      }
    }
    ctx.restore();
  }
}

// ===== Background Stars (静态背景星) =====
class BgStar {
  constructor(w, h) {
    this.x = Math.random() * w; this.y = Math.random() * h;
    this.size = Math.random() * 2 + 0.3;
    this.baseAlpha = Math.random() * 0.6 + 0.3;
    this.twinkle = Math.random() * 0.03 + 0.005;
    this.twinkleOff = Math.random() * Math.PI * 2;
    const c = Math.random();
    if (c < 0.5) { this.r = 255; this.g = 252; this.b = 248; }
    else if (c < 0.75) { this.r = 220; this.g = 230; this.b = 255; }
    else { this.r = 255; this.g = 230; this.b = 220; }
  }
  draw(ctx, time, alpha) {
    const a = this.baseAlpha * (0.5 + 0.5 * Math.sin(time * this.twinkle + this.twinkleOff)) * alpha;
    if (a < 0.02) return;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${a})`; ctx.fill();
    if (this.size > 1.5) {
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${a * 0.1})`; ctx.fill();
    }
  }
}

// ===== Shooting Star =====
class ShootingStar {
  constructor(w, h) { this.w = w; this.h = h; this.active = false; }
  reset() {
    this.x = Math.random() * this.w * 0.7; this.y = Math.random() * this.h * 0.25;
    this.len = Math.random() * 100 + 60;
    this.speed = Math.random() * 10 + 8;
    this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.4;
    this.alpha = 1; this.life = 0;
    this.maxLife = 25 + Math.random() * 20;
    this.active = true;
  }
  update() {
    if (!this.active) return;
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;
    this.life++;
    this.alpha = 1 - this.life / this.maxLife;
    if (this.life >= this.maxLife) this.active = false;
  }
  draw(ctx) {
    if (!this.active || this.alpha <= 0) return;
    const tx = this.x - Math.cos(this.angle) * this.len;
    const ty = this.y - Math.sin(this.angle) * this.len;
    const g = ctx.createLinearGradient(this.x, this.y, tx, ty);
    g.addColorStop(0, `rgba(255,255,255,${this.alpha})`);
    g.addColorStop(0.2, `rgba(200,210,255,${this.alpha * 0.5})`);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(tx, ty);
    ctx.strokeStyle = g; ctx.lineWidth = 1.8; ctx.stroke();
    ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${this.alpha})`; ctx.fill();
  }
}

// ===== Orbit Particle (爱心环绕粒子) =====
class OrbitParticle {
  constructor(cx, cy, enlarge) {
    this.cx = cx; this.cy = cy; this.enlarge = enlarge;
    this.t = Math.random() * Math.PI * 2;
    this.speed = (Math.random() * 0.012 + 0.006) * (Math.random() < 0.5 ? 1 : -1);
    this.offset = Math.random() * 12 + 6;
    this.size = Math.random() * 2 + 0.8;
    this.trail = []; this.maxTrail = 10;
    const c = Math.random();
    if (c < 0.4) { this.r = 255; this.g = 150; this.b = 200; }
    else if (c < 0.7) { this.r = 255; this.g = 215; this.b = 100; }
    else { this.r = 220; this.g = 220; this.b = 255; }
  }
  update() {
    this.t += this.speed;
    let hx = 16 * Math.pow(Math.sin(this.t), 3);
    let hy = -(13 * Math.cos(this.t) - 5 * Math.cos(2*this.t) - 2 * Math.cos(3*this.t) - Math.cos(4*this.t));
    const s = this.enlarge * 1.15;
    const a = Math.atan2(hy, hx);
    const x = this.cx + hx * s + Math.cos(a) * this.offset;
    const y = this.cy + hy * s + Math.sin(a) * this.offset;
    this.trail.push({ x, y });
    if (this.trail.length > this.maxTrail) this.trail.shift();
    this.x = x; this.y = y;
  }
  draw(ctx) {
    for (let i = 0; i < this.trail.length; i++) {
      const p = this.trail[i];
      const a = (i / this.trail.length) * 0.35;
      ctx.beginPath(); ctx.arc(p.x, p.y, this.size * (i / this.trail.length) * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${a})`; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},0.85)`; ctx.fill();
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 3.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},0.08)`; ctx.fill();
  }
}

// ===== Heart bloom =====
function drawHeartBloom(ctx, cx, cy, enlarge, pulse) {
  const s = enlarge * 18 * (1 + pulse * 0.15);
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, s);
  g.addColorStop(0, `rgba(255,105,180,${0.1 + pulse * 0.04})`);
  g.addColorStop(0.35, `rgba(255,80,160,${0.05 + pulse * 0.02})`);
  g.addColorStop(0.7, `rgba(180,40,120,${0.015})`);
  g.addColorStop(1, 'rgba(100,20,80,0)');
  ctx.fillStyle = g; ctx.fillRect(cx - s, cy - s, s * 2, s * 2);
}

// ===== Heart Animation =====
const HEART_COLOR = '#FF69B4';
function heartFunction(t, s, cx, cy) {
  let x = 16 * Math.pow(Math.sin(t), 3);
  let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
  return [cx + x * s, cy + y * s];
}
function scatterInside(x, y, cx, cy, beta) {
  const rx = -beta * Math.log(Math.random());
  const ry = -beta * Math.log(Math.random());
  return [x - rx * (x - cx), y - ry * (y - cy)];
}
function heartCurve(p) { return 2 * (2 * Math.sin(4 * p)) / (2 * Math.PI); }

class HeartAnim {
  constructor(cx, cy, enlarge) {
    this.cx = cx; this.cy = cy; this.enlarge = enlarge;
    this.points = []; this.edgePoints = []; this.centerPoints = [];
    this.allFrames = {}; this.frameCount = 20;
    this.build(2000);
    for (let f = 0; f < this.frameCount; f++) this.calcFrame(f);
  }
  build(n) {
    for (let i = 0; i < n; i++) {
      const t = Math.random() * 2 * Math.PI;
      this.points.push(heartFunction(t, this.enlarge, this.cx, this.cy));
    }
    for (const [px, py] of this.points)
      for (let j = 0; j < 3; j++)
        this.edgePoints.push(scatterInside(px, py, this.cx, this.cy, 0.05));
    for (let i = 0; i < 6000; i++) {
      const [px, py] = this.points[Math.floor(Math.random() * this.points.length)];
      this.centerPoints.push(scatterInside(px, py, this.cx, this.cy, 0.17));
    }
  }
  calcPos(x, y, ratio) {
    const f = 1 / Math.pow((x - this.cx) ** 2 + (y - this.cy) ** 2, 0.52);
    return [x - ratio * f * (x - this.cx) - (Math.random() * 2 - 1),
            y - ratio * f * (y - this.cy) - (Math.random() * 2 - 1)];
  }
  shrink(x, y, ratio) {
    const f = -1 / Math.pow((x - this.cx) ** 2 + (y - this.cy) ** 2, 0.6);
    return [x - ratio * f * (x - this.cx), y - ratio * f * (y - this.cy)];
  }
  calcFrame(frame) {
    const ratio = 10 * heartCurve(frame / 10 * Math.PI);
    const hr = 4 + 6 * (1 + heartCurve(frame / 10 * Math.PI));
    const hn = 3000 + 4000 * Math.abs(heartCurve(frame / 10 * Math.PI) ** 2);
    const pts = []; const hs = new Set();
    for (let i = 0; i < hn; i++) {
      const t = Math.random() * 4 * Math.PI;
      let [x, y] = heartFunction(t, this.enlarge * 1.045, this.cx, this.cy);
      [x, y] = this.shrink(x, y, hr);
      const k = `${Math.round(x)},${Math.round(y)}`;
      if (!hs.has(k)) { hs.add(k); pts.push([x + (Math.random() * 28 - 14), y + (Math.random() * 28 - 14), Math.random() < 0.33 ? 1 : 2]); }
    }
    for (const [px, py] of this.points) { const [x, y] = this.calcPos(px, py, ratio); pts.push([x, y, Math.floor(Math.random() * 3) + 1]); }
    for (const [px, py] of this.edgePoints) { const [x, y] = this.calcPos(px, py, ratio); pts.push([x, y, Math.floor(Math.random() * 2) + 1]); }
    for (const [px, py] of this.centerPoints) { const [x, y] = this.calcPos(px, py, ratio); pts.push([x, y, Math.floor(Math.random() * 2) + 1]); }
    this.allFrames[frame] = pts;
  }
  render(ctx, frame) {
    const pts = this.allFrames[frame % this.frameCount];
    ctx.fillStyle = HEART_COLOR;
    for (const [x, y, s] of pts) ctx.fillRect(x, y, s, s);
  }
}

// ===== Heart Page =====
function startHeartAnimation() {
  const canvas = document.getElementById('heartCanvas');
  const { ctx, w, h } = setupCanvas(canvas);
  const skyConfig = getSkyConfig();
  const cx = w / 2, cy = h / 2;
  const enlarge = Math.min(w, h) / 50;

  // 背景星星
  const bgStars = Array.from({ length: 500 }, () => new BgStar(w, h));
  // 银河
  const milkyWay = new MilkyWay(w, h);
  // 流星
  const shootingStars = Array.from({ length: 3 }, () => new ShootingStar(w, h));
  // 环绕粒子
  const orbitParticles = Array.from({ length: 60 }, () => new OrbitParticle(cx, cy, enlarge));
  // 爱心
  const heart = new HeartAnim(cx, cy, enlarge);
  let frame = 0, time = 0, lastFrameTime = 0;

  function loop(timestamp) {
    time++;
    drawSky(ctx, w, h, skyConfig);

    // 背景星星
    for (const s of bgStars) s.draw(ctx, time, skyConfig.starAlpha);

    // 银河
    milkyWay.draw(ctx, time, skyConfig.starAlpha);

    // 流星
    for (const ss of shootingStars) {
      if (!ss.active && Math.random() < 0.003) ss.reset();
      ss.update(); ss.draw(ctx);
    }

    // 爱心 bloom
    const pulse = Math.abs(heartCurve(frame / 10 * Math.PI));
    drawHeartBloom(ctx, cx, cy, enlarge, pulse);

    // 爱心
    if (timestamp - lastFrameTime >= 160) { frame++; lastFrameTime = timestamp; }
    heart.render(ctx, frame);

    // 环绕粒子
    for (const p of orbitParticles) { p.update(); p.draw(ctx); }

    heartAnimId = requestAnimationFrame(loop);
  }
  heartAnimId = requestAnimationFrame(loop);
}

// ===== Firework (真实物理烟花) =====
function startFireworkAnimation() {
  const canvas = document.getElementById('fireworkCanvas');
  const { ctx, w, h } = setupCanvas(canvas);

  // 烟花发射弹
  class Rocket {
    constructor() { this.reset(); }
    reset() {
      this.x = w * 0.2 + Math.random() * w * 0.6;
      this.y = h;
      this.targetY = h * 0.1 + Math.random() * h * 0.35;
      this.vy = -(Math.random() * 4 + 6);
      this.vx = (Math.random() - 0.5) * 1.5;
      this.trail = [];
      this.alive = true;
      this.exploded = false;
      // 发射时带微弱火花
      const colors = [
        [255, 180, 220], [255, 220, 150], [180, 200, 255],
        [255, 150, 150], [200, 255, 200], [220, 180, 255],
        [255, 200, 100], [150, 220, 255]
      ];
      this.color = colors[Math.floor(Math.random() * colors.length)];
      this.sparkColor = this.color.map(c => Math.min(255, c + 30));
    }
    update() {
      if (!this.alive) return;
      // 存轨迹
      this.trail.push({ x: this.x, y: this.y, alpha: 1 });
      if (this.trail.length > 15) this.trail.shift();
      // 衰减轨迹
      for (const t of this.trail) t.alpha *= 0.92;

      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.04; // gravity slows ascent

      if (this.y <= this.targetY || this.vy >= -0.5) {
        this.alive = false;
        this.exploded = true;
      }
    }
    draw(ctx) {
      if (!this.alive) return;
      // 尾迹
      for (let i = 0; i < this.trail.length; i++) {
        const t = this.trail[i];
        if (t.alpha < 0.02) continue;
        ctx.beginPath();
        ctx.arc(t.x, t.y, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.sparkColor[0]},${this.sparkColor[1]},${this.sparkColor[2]},${t.alpha * 0.5})`;
        ctx.fill();
      }
      // 弹头
      ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,240,0.9)`; ctx.fill();
      ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.color[0]},${this.color[1]},${this.color[2]},0.15)`; ctx.fill();
    }
  }

  // 爆炸粒子
  class Spark {
    constructor(x, y, color, type) {
      this.x = x; this.y = y;
      this.type = type; // 'burst', 'willow', 'ring'
      const angle = Math.random() * Math.PI * 2;
      let speed;
      if (type === 'ring') {
        speed = Math.random() * 0.8 + 3.5;
      } else if (type === 'willow') {
        speed = Math.random() * 3 + 1.5;
      } else {
        speed = Math.random() * 5 + 1;
      }
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.gravity = type === 'willow' ? 0.06 : 0.03;
      this.friction = type === 'willow' ? 0.97 : 0.985;
      this.alpha = 1;
      this.decay = type === 'willow' ? 0.008 + Math.random() * 0.005 : 0.012 + Math.random() * 0.01;
      this.size = Math.random() * 2 + 0.8;
      this.r = color[0] + Math.floor((Math.random() - 0.5) * 30);
      this.g = color[1] + Math.floor((Math.random() - 0.5) * 30);
      this.b = color[2] + Math.floor((Math.random() - 0.5) * 30);
      this.trail = [];
    }
    update() {
      this.trail.push({ x: this.x, y: this.y, a: this.alpha });
      if (this.trail.length > 8) this.trail.shift();
      for (const t of this.trail) t.a *= 0.85;
      this.vy += this.gravity;
      this.vx *= this.friction;
      this.vy *= this.friction;
      this.x += this.vx;
      this.y += this.vy;
      this.alpha -= this.decay;
      // 颜色随衰减变暖
      if (this.alpha < 0.4) {
        this.r = Math.min(255, this.r + 0.5);
        this.g = Math.max(0, this.g - 0.3);
      }
    }
    draw(ctx) {
      // 尾迹
      for (let i = 0; i < this.trail.length; i++) {
        const t = this.trail[i];
        if (t.a < 0.02) continue;
        ctx.beginPath();
        ctx.arc(t.x, t.y, this.size * 0.4 * (i / this.trail.length), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${t.a * 0.3})`;
        ctx.fill();
      }
      if (this.alpha < 0.02) return;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${this.alpha})`;
      ctx.fill();
      // 发光
      if (this.alpha > 0.3) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${this.alpha * 0.06})`;
        ctx.fill();
      }
    }
    get alive() { return this.alpha > 0.01; }
  }

  // 爆炸闪光
  class Flash {
    constructor(x, y, color) {
      this.x = x; this.y = y;
      this.r = color[0]; this.g = color[1]; this.b = color[2];
      this.radius = 5; this.maxRadius = 40 + Math.random() * 30;
      this.alpha = 0.6; this.alive = true;
    }
    update() {
      this.radius += (this.maxRadius - this.radius) * 0.15;
      this.alpha *= 0.88;
      if (this.alpha < 0.01) this.alive = false;
    }
    draw(ctx) {
      if (!this.alive) return;
      const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
      g.addColorStop(0, `rgba(255,255,255,${this.alpha * 0.5})`);
      g.addColorStop(0.3, `rgba(${this.r},${this.g},${this.b},${this.alpha * 0.3})`);
      g.addColorStop(1, `rgba(${this.r},${this.g},${this.b},0)`);
      ctx.fillStyle = g;
      ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
    }
  }

  let rockets = [];
  let sparks = [];
  let flashes = [];
  let fc = 0;

  function explode(rocket) {
    const types = ['burst', 'burst', 'willow', 'ring', 'burst'];
    const type = types[Math.floor(Math.random() * types.length)];
    const count = type === 'ring' ? 100 : type === 'willow' ? 120 : 80 + Math.floor(Math.random() * 60);
    for (let i = 0; i < count; i++) {
      sparks.push(new Spark(rocket.x, rocket.y, rocket.color, type));
    }
    // 内层小爆炸（双色效果）
    if (Math.random() < 0.5) {
      const innerColor = [
        255 - rocket.color[0] + 128,
        255 - rocket.color[1] + 128,
        255 - rocket.color[2] + 128
      ].map(c => Math.min(255, Math.max(0, c)));
      for (let i = 0; i < 30; i++) {
        const s = new Spark(rocket.x, rocket.y, innerColor, 'burst');
        s.vx *= 0.4; s.vy *= 0.4;
        sparks.push(s);
      }
    }
    flashes.push(new Flash(rocket.x, rocket.y, rocket.color));
  }

  // 背景星星（烟花页也要星空）
  const fwStars = Array.from({ length: 200 }, () => new BgStar(w, h));

  function loop() {
    // 半透明覆盖实现余晖
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0, 0, w, h);

    // 每隔一定时间重绘背景星星防止被完全覆盖
    if (fc % 8 === 0) {
      for (const s of fwStars) s.draw(ctx, fc, 0.3);
    }

    // 发射
    if (fc < 30 && fc % 8 === 0) {
      rockets.push(new Rocket());
    } else if (fc % 35 === 0 || (Math.random() < 0.03)) {
      rockets.push(new Rocket());
    }
    // 偶尔同时两发
    if (Math.random() < 0.01) { rockets.push(new Rocket()); }

    // 更新
    for (const r of rockets) {
      r.update();
      if (r.exploded) { explode(r); r.exploded = false; }
      r.draw(ctx);
    }
    rockets = rockets.filter(r => r.alive);

    for (const s of sparks) { s.update(); s.draw(ctx); }
    sparks = sparks.filter(s => s.alive);

    for (const f of flashes) { f.update(); f.draw(ctx); }
    flashes = flashes.filter(f => f.alive);

    fc++;
    fireworkAnimId = requestAnimationFrame(loop);
  }
  fireworkAnimId = requestAnimationFrame(loop);
}

// ===== Init =====
startDogBg();
</script>
